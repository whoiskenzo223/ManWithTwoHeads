<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XHTTP Status</title>
  <style>
    body { font-family: system-ui; background: #0a0c10; color: #eee; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 1rem; }
    .card { background: #1e1f24; border-radius: 24px; padding: 2rem; max-width: 600px; }
    button { background: #2f3b6c; border: none; color: white; padding: 12px 24px; border-radius: 40px; cursor: pointer; width: 100%; margin-top: 1rem; }
    .status { margin-top: 1rem; padding: 1rem; background: #0f1117; border-radius: 16px; }
    .ok { color: #6febaf; }
    .error { color: #ff9e9e; }
  </style>
</head>
<body>
<div class="card">
  <h2>🔍 XHTTP Relay Monitor</h2>
  <p>وضعیت اتصال به <code>TARGET_DOMAIN</code> را بررسی می‌کند.</p>
  <button id="checkBtn">بررسی وضعیت</button>
  <div id="result" class="status">⏳ کلیک کنید...</div>
  <div class="footer">• پراکسی فعال است • درخواست‌های دیگر به سرور اصلی هدایت می‌شوند</div>
</div>
<script>
  document.getElementById('checkBtn').onclick = async () => {
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = "🔄 در حال بررسی...";
    try {
      const res = await fetch('/api?action=check');
      const data = await res.json();
      if (data.reachable) {
        resultDiv.innerHTML = `<span class="ok">✅ سرور قابل دسترسی است (${data.timestamp})</span>`;
      } else {
        resultDiv.innerHTML = `<span class="error">❌ سرور پاسخ نمی‌دهد</span>`;
      }
    } catch {
      resultDiv.innerHTML = `<span class="error">⚠️ خطا در ارتباط با API</span>`;
    }
  };
</script>
</body>
</html>
